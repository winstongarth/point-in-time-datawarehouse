# Cross-vendor reconciliation rules (CLAUDE.md 7). Declared here, not in
# code, so a new comparison can be added without touching pdw.dq_checks.
#
# "right: tiingo" - the spec originally named Stooq here; amended at M2 when
# Stooq turned out to sit behind a JS bot challenge (see CLAUDE.md 4.3 and
# docs/limitations.md). Tiingo requires a real API token
# (PDW_TIINGO_API_TOKEN) that may not be configured on every machine running
# this check; with no comparable tiingo price_fact rows, the check still
# writes one passing result noting zero comparisons (CLAUDE.md 7: "a check
# that only records failures cannot support a coverage metric").
#
# field: adj_close, not close - amended at M6 against live data. yfinance's
# Close is always split-adjusted by Yahoo's own backend regardless of the
# auto_adjust fetch flag (confirmed live: AVGO's pre-2024-07-15-split dates
# already read in post-split scale), while Tiingo's close is the true raw
# historical quote. Comparing close cross-vendor would show a permanent,
# unfixable ~10x "mismatch" for every split-affected ticker's entire
# pre-split history - a vendor semantic difference, not a data quality
# defect. adj_close is the field both vendors define the same way and
# agree on closely (confirmed live: AVGO 2024-07-01 - yfinance 161.051 vs
# tiingo 161.079). See docs/limitations.md.
#
# tolerance 1.5%, not 0.1% - amended at M6 against live data. adj_close is
# *derived*, not quoted: each vendor computes its own dividend/split
# adjustment factors, and two independently-computed derivations don't
# match to 0.1%. Live run against the full universe showed ~12,600 dates
# failing a 0.1% tolerance with relative differences maxing out at 1.377%
# (median 0.34%) and zero outliers suggesting real corruption - a tight,
# bounded band consistent with dividend-adjustment-methodology drift, not
# a defect. 1.5% clears that whole observed band while staying far tighter
# than any genuine error would produce (a decimal shift is a ~900% diff).
- name: price_close_cross_vendor
  left: { source: yfinance, field: adj_close }
  right: { source: tiingo, field: adj_close }
  grain: [entity_id, trade_date]
  tolerance: { type: relative, value: 0.015 }
  severity: WARN
  escalate_if: { consecutive_days: 3, severity: BREAK }

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: pdw
          POSTGRES_PASSWORD: pdw
          POSTGRES_DB: pdw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pdw -d pdw"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PDW_DATABASE_URL: postgresql://pdw:pdw@localhost:5432/pdw
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy --strict)
        run: uv run mypy --strict src

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Test (pytest)
        run: uv run pytest
